<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | KINDAI eSports Festival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <header class="site-header">
      <a
        class="brand event-logo event-logo-compact"
        th:href="@{/}"
        aria-label="KINDAI eSports Festival ホーム"
      >
        <span class="event-logo-main">KINDAI</span>
        <span class="event-logo-sub">eSports Festival</span>
      </a>
      <input
        class="nav-toggle"
        id="nav-toggle"
        type="checkbox"
        aria-label="メニューを開閉"
      />
      <label class="hamburger" for="nav-toggle" aria-hidden="true"
        ><span></span
      ></label>
      <nav class="nav" aria-label="メインメニュー">
        <a th:href="@{/}">ホーム</a>
        <details class="nav-group">
          <summary>イベント</summary>
          <a th:href="@{/event-a}">つなげ！絆とレール〜暴走列車近大行き〜</a>
          <a th:href="@{/event-b}">MOFF MOFF CUP</a>
        </details>
        <a th:href="@{/news}">お知らせ</a>
        <a th:href="@{/location}">場所</a>
        <a th:href="@{/coming-soon}">感想フォーム</a>
      </nav>
    </header>

    <main class="page">
      <section class="coming-soon-layout">
        <div class="visual-panel visual-coming-soon large" aria-hidden="true">
          <span>COMING SOON</span>
        </div>
        <div class="coming-soon-copy">
          <p class="eyebrow">COMING SOON</p>
          <h1>準備中です</h1>
          <p>
            このページまたはフォームは現在準備中です。公開までしばらくお待ちください。
          </p>
          <a class="button primary" th:href="@{/}">ホームへ戻る</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>企画・運営：近畿大学情報学部 eスポーツ学生運営チーム</p>
      <p>協力：eスタジアム株式会社</p>
      <p></p>
      <p>&copy; 2026 KINDAI eSports Festival</p>
    </footer>
  </body>
</html>
