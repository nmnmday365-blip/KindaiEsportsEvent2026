<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アクセス | KINDAI eSports Festival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <header class="site-header">
      <a
        class="brand event-logo event-logo-compact"
        th:href="@{/}"
        aria-label="KINDAI eSports Festival ホーム"
      >
        <span class="event-logo-main">KINDAI</span>
        <span class="event-logo-sub">eSports Festival</span>
      </a>
      <input
        class="nav-toggle"
        id="nav-toggle"
        type="checkbox"
        aria-label="メニューを開閉"
      />
      <label class="hamburger" for="nav-toggle" aria-hidden="true"
        ><span></span
      ></label>
      <nav class="nav" aria-label="メインメニュー">
        <a th:href="@{/}">ホーム</a>
        <details class="nav-group">
          <summary>イベント</summary>
          <a th:href="@{/event-a}">つなげ！絆とレール〜暴走列車近大行き〜</a>
          <a th:href="@{/event-b}">MOFF MOFF CUP</a>
        </details>
        <a th:href="@{/news}">お知らせ</a>
        <a th:href="@{/location}">場所</a>
        <a th:href="@{/coming-soon}">感想フォーム</a>
      </nav>
    </header>

    <main class="page">
      <section class="page-heading">
        <p class="eyebrow">ACCESS</p>
        <h1>アクセス</h1>
        <p>会場：近畿大学 Eキャンパス E館 esports Arena</p>
      </section>

      <section class="location-layout">
        <div class="venue-info">
          <span class="tag">VENUE</span>
          <h2>会場名</h2>
          <p class="large">近畿大学 Eキャンパス E館 esports Arena</p>
          <h2>住所</h2>
          <p>
            大阪府東大阪市小若江3丁目4-1 近畿大学 東大阪キャンパス
            EキャンパスE館（情報学部棟）一階
          </p>
          <h2>当日の注意</h2>
          <p>開始10分前までに受付へお越しください。</p>
        </div>

        <iframe
          class="map-embed"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3282.1288964002415!2d135.58928842574235!3d34.651447572937265!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6000df9733033637%3A0x5f881922fcd26f0e!2z6L-R55W_5aSn5a2mIEXppKjvvIhLRElYKQ!5e0!3m2!1sja!2sjp!4v1782996107487!5m2!1sja!2sjp"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 近畿大学 esports 体験イベント</p>
    </footer>
  </body>
</html>
